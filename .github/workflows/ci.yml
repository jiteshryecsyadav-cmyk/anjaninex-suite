# =============================================================================
# CI — har push par khud check: build tootta hai? tests fail hote hain?
#
# Yahi wo "warning system" hai: commission par kaam kiya aur master ki coding
# bigdi, to deploy se PEHLE yahan LAAL cross dikh jayega — client ko nahi.
# GitHub → repo → Actions tab me har push ka result. Fail par email bhi aata hai.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # .NET API — build + tests (GST checksum, FriendlyError, NameCase...)
  api:
    name: API build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build apps/api/Namokara.Api.csproj -c Release -v q
      - name: Tests
        run: dotnet test apps/api.Tests/Namokara.Api.Tests.csproj -c Release -v q --nologo

  # Angular — typecheck + production build (template ki galti yahin pakdi jati hai)
  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
