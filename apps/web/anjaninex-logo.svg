<?xml version="1.0" encoding="UTF-8"?>
<!-- Anjaninex Logo v2 — interlocking organic shapes (not just 4 squares) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Anjaninex">
  <defs>
    <!-- Soft 3D drop shadow on each layer -->
    <filter id="ax-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1.5" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner highlight for top-edge gloss -->
    <linearGradient id="topGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="0.35" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- LAYER 1 (back): Navy "L" shape covering top-right + curving down-right -->
  <path d="
      M 100 20
      L 165 20
      Q 185 20 185 40
      L 185 140
      Q 185 165 165 178
      Q 145 188 125 170
      L 110 155
      Q 100 145 100 130
      Z"
      fill="#1B2E5C" filter="url(#ax-soft)"/>

  <!-- LAYER 2: Bottom-right RED rounded shape peeking out -->
  <path d="
      M 130 105
      Q 185 105 185 145
      Q 185 175 160 182
      Q 135 188 125 175
      Q 115 160 118 138
      Q 122 110 130 105
      Z"
      fill="#DC2626" filter="url(#ax-soft)"/>

  <!-- LAYER 3: Top-left RED "L" shape (mirror of navy) -->
  <path d="
      M 40 20
      L 130 20
      Q 145 25 142 50
      L 142 95
      Q 138 115 118 118
      L 50 118
      Q 20 116 20 90
      L 20 45
      Q 20 20 40 20
      Z"
      fill="#DC2626" filter="url(#ax-soft)"/>

  <!-- LAYER 4 (front): Cream swoosh / leaf shape bottom-left -->
  <path d="
      M 25 105
      Q 25 100 35 100
      L 95 100
      Q 105 100 105 115
      L 105 165
      Q 100 182 80 182
      Q 50 182 35 165
      Q 22 145 22 125
      Q 22 110 25 105
      Z"
      fill="#FAF7F0" filter="url(#ax-soft)"/>

  <!-- Highlight curve on cream swoosh (the "e" arc effect) -->
  <path d="M 50 120 Q 90 120 95 150 Q 95 170 75 175"
        fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Top gloss overlay (subtle 3D shine) -->
  <rect x="15" y="15" width="175" height="175" rx="35" fill="url(#topGloss)" pointer-events="none"/>
</svg>
