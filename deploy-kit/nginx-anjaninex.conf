# Anjaninex — nginx (subdomain: trade.anjaninex.com)
# Copy → /etc/nginx/sites-available/anjaninex
#   sudo ln -s /etc/nginx/sites-available/anjaninex /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Phir SSL:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d trade.anjaninex.com

server {
    listen 80;
    server_name trade.anjaninex.com;

    root /var/www/anjaninex-web;     # Angular dist/<name>/browser yahan
    index index.html;

    # API → .NET Kestrel (127.0.0.1:5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;    # bill-scan / photo upload
    }

    # Angular SPA routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
