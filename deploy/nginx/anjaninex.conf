# Vyapaar Setu — nginx (VPS)
#
# ⚠️ Ye file WEBSOCKET ki dikkat theek karti hai:
# Purani config me /api/ block me Upgrade/Connection headers NAHI the, isliye
# SignalR (party-chat live) ka WebSocket handshake fail hota tha —
#     "WebSocket handshake: Unexpected response code: 200"
# Chat phir bhi chalti thi (SSE par fallback), par har baar 2 fail attempt ke
# baad — isliye message aane me deri lagti thi.
#
# Lagane ka tarika (VPS par):
#   nano /etc/nginx/sites-available/anjaninex     <- yahan ye poora content paste
#   nginx -t && systemctl reload nginx

# WebSocket upgrade ke liye — Connection header tabhi 'upgrade' bhejo jab
# browser ne maanga ho, warna khali (normal HTTP request tootni nahi chahiye).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name vyaparsetu.anjaninex.com;

    root /var/www/anjaninex-web;
    index index.html;

    # ---- SignalR hub (party-chat live) — WEBSOCKET ----
    # /api/ se PEHLE rakhna zaroori hai, warna neeche wala block pakad lega.
    location /api/hubs/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_buffering off;          # SSE/live push turant jaye, buffer me na atke
        proxy_read_timeout 3600s;     # live connection lamba chalta hai — 504 na aaye
        proxy_send_timeout 3600s;
    }

    # ---- API → .NET (Kestrel 5000) ----
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;     # bill-scan / photo upload ke liye
        # AI scan (Gemini/Claude) me 30-60s lag sakte hain — default 60s par
        # 504 Gateway Timeout aa jata tha, isliye badhaya.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---- Angular SPA routing — sab kuch index.html pe ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
