# ============================================================================
# Namokara Suite — Local Development Stack
# ============================================================================
# Quick start:
#   1. cp .env.example .env
#   2. docker compose up -d
#   3. Wait ~30 sec for all services to be healthy
#   4. Open http://localhost:5000/swagger (API)
#   5. Open http://localhost:4200 (Web)
#   6. Open http://localhost:5050 (PgAdmin) — login with values from .env
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: namokara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-namokara_dev}
      POSTGRES_USER: ${POSTGRES_USER:-namokara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_only_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-namokara} -d ${POSTGRES_DB:-namokara_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [namokara_net]

  # --------------------------------------------------------------------------
  # PgBouncer — connection pooling
  # --------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.20
    container_name: namokara_pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER:-namokara}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dev_only_change_me}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-namokara_dev}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [namokara_net]

  # --------------------------------------------------------------------------
  # Redis 7
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: namokara_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_only_change_me}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_only_change_me}", "ping"]
      interval: 10s
    networks: [namokara_net]

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible storage
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: namokara_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-namokara}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev_only_change_me}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
    networks: [namokara_net]

  minio-init:
    image: minio/mc:latest
    container_name: namokara_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-namokara} ${MINIO_ROOT_PASSWORD:-dev_only_change_me};
      mc mb -p local/namokara-bills || true;
      mc mb -p local/namokara-photos || true;
      mc mb -p local/namokara-selfies || true;
      mc mb -p local/namokara-docs || true;
      mc version enable local/namokara-bills || true;
      mc version enable local/namokara-photos || true;
      mc version enable local/namokara-selfies || true;
      mc version enable local/namokara-docs || true;
      mc anonymous set none local/namokara-bills || true;
      mc anonymous set none local/namokara-photos || true;
      mc anonymous set none local/namokara-selfies || true;
      mc anonymous set none local/namokara-docs || true;
      exit 0;
      "
    # P0-15 fix: all buckets PRIVATE. API serves objects via presigned URLs only.
    # P1: versioning enabled on every bucket (so accidental deletes can be recovered).
    networks: [namokara_net]

  # --------------------------------------------------------------------------
  # Seq — structured log viewer
  # --------------------------------------------------------------------------
  seq:
    image: datalust/seq:latest
    container_name: namokara_seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
    ports:
      - "${SEQ_PORT:-5341}:80"
    volumes:
      - seq_data:/data
    networks: [namokara_net]

  # --------------------------------------------------------------------------
  # PgAdmin — Postgres GUI
  # --------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: namokara_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-dev@namokara.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-dev_only_change_me}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks: [namokara_net]

  # --------------------------------------------------------------------------
  # Mailhog — local SMTP catcher
  # --------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: namokara_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks: [namokara_net]

  # --------------------------------------------------------------------------
  # Jaeger — distributed tracing
  # --------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: namokara_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_PORT:-16686}:16686"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    networks: [namokara_net]

volumes:
  pg_data:
  redis_data:
  minio_data:
  seq_data:
  pgadmin_data:

networks:
  namokara_net:
    driver: bridge
